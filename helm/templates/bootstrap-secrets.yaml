{{- $existing := (lookup "v1" "Secret" .Release.Namespace (printf "%s-bootstrap" (include "kure.fullname" .))) -}}
{{- $serviceToken := "" -}}
{{- $sessionSecret := "" -}}
{{- if $existing -}}
{{- $serviceToken = index $existing.data "service-token" | b64dec -}}
{{- $sessionSecret = index $existing.data "session-secret" | b64dec -}}
{{- else -}}
{{- $serviceToken = randAlphaNum 48 -}}
{{- $sessionSecret = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kure.fullname" . }}-bootstrap
  labels:
    {{- include "kure.labels" . | nindent 4 }}
type: Opaque
stringData:
  service-token: {{ $serviceToken | quote }}
  session-secret: {{ $sessionSecret | quote }}
