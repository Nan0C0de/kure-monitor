apiVersion: v2
name: kure
description: Kubernetes failure diagnosis tool with AI-powered troubleshooting
type: application
kubeVersion: ">=1.20.0-0"
version: 2.3.0
appVersion: "2.3.0"
keywords:
  - kubernetes
  - monitoring
  - troubleshooting
  - security-scanning
  - ai-powered
  - pod-failure-detection
  - diagnostics
  - observability
home: https://nan0c0de.github.io/kure-monitor
sources:
  - https://github.com/Nan0C0de/kure-monitor
maintainers:
  - name: Nan0C0de
    email: nano.code@outlook.com
annotations:
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |
    - kind: changed
      description: "BREAKING: auth overhaul - legacy single-key `AUTH_API_KEY` / `auth.apiKey` model removed. Dashboard now uses user accounts (first-install forces admin creation; invite-based onboarding with read/write/admin roles). Service-to-service traffic uses a separate shared `SERVICE_TOKEN`. Helm auto-generates both tokens in a `{release}-bootstrap` Secret and preserves them across upgrades via `lookup`."
    - kind: removed
      description: "BREAKING: cluster metrics feature removed - Monitoring tab, cluster metrics ingestion, pod metrics history, and `metrics-server` requirement are gone. Agent no longer collects or reports metrics. `agent.clusterMetrics` Helm values removed. Only `/api/metrics/security-scan-duration` (Prometheus scrape) remains."
    - kind: added
      description: "New LLM provider: GitHub Copilot (GitHub Models) - OpenAI-compatible via `https://models.github.ai/inference`, authenticated with a GitHub fine-grained PAT (Models permission). Aliases: `copilot`, `github`, `github_models`. Default model `openai/gpt-5-mini`."
    - kind: changed
      description: "LLM provider model refresh - OpenAI: gpt-5, gpt-5-mini (default), gpt-4.1; Anthropic: claude-opus-4-5, claude-sonnet-4-5 (default), claude-haiku-4-5; Gemini: gemini-2.5-pro, gemini-2.5-flash (default), gemini-2.5-flash-lite; Ollama: llama3.3, llama3.2 (default), qwen2.5."
    - kind: fixed
      description: "Admin user couldn't see Admin tab - `/api/auth/me` returns `{user: {...}}` (wrapped), but `AuthContext.js` was calling `setUser(me)` directly so `user.role` was undefined. Fixed by unwrapping `me.user` in all four auth flows (refresh, login, setup, acceptInvitation)."
    - kind: fixed
      description: "Log-Aware Troubleshoot section now renders above the AI-Generated Solution for CrashLoopBackOff / OOMKilled pods (was rendering below)."
  artifacthub.io/category: monitoring-logging
  artifacthub.io/displayName: Kure - Kubernetes Failure Diagnosis
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/Nan0C0de/kure-monitor
    - name: Chart Source
      url: https://github.com/Nan0C0de/kure-monitor/tree/main/helm
    - name: Documentation
      url: https://github.com/Nan0C0de/kure-monitor#readme
  artifacthub.io/maintainers: |
    - name: Nan0C0de
      email: nano.code@outlook.com
  artifacthub.io/operator: false
  artifacthub.io/prerelease: false
  artifacthub.io/install: |
    helm repo add kure-monitor https://nan0c0de.github.io/kure-monitor/

    # Install Kure Monitor
    helm install kure-monitor kure-monitor/kure --version 2.3.0 \
      --create-namespace --namespace kure-system

    # After installation, configure LLM provider via the Admin panel
    # to enable AI-powered troubleshooting suggestions